<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Math Nerd</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a0a1a; 
            font-family: 'Courier New', monospace; overflow: hidden;
            position: relative;
        }
        canvas { display: block; border-radius: 8px; }
        #mobileInput {
            position: absolute;
            top: -100px;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            font-size: 16px; /* verhindert iOS-Zoom */
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <!-- Verstecktes Input-Feld für mobile Tastatur -->
    <input id="mobileInput" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="off">
    <script src="pi-digits.js"></script>
    <script src="game.js"></script>
</body>
</html>
