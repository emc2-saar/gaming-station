<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #87CEEB;
            font-family: 'Courier New', monospace;
            image-rendering: pixelated;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }

        #ui div {
            margin-bottom: 5px;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 20;
            font-family: 'Courier New', monospace;
        }

        #game-over-screen {
            display: none;
        }

        h1 {
            font-size: 48px;
            color: #55FF55;
            text-shadow: 3px 3px 0 #006600;
            margin-bottom: 20px;
        }

        .info {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ccc;
        }

        button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            background: #4CAF50;
            color: white;
            border: 3px solid #2E7D32;
            cursor: pointer;
        }

        button:hover {
            background: #66BB6A;
        }

        #final-score {
            font-size: 32px;
            color: #FFD700;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>&#x1F48E; Edelsteine: <span id="diamonds">0</span></div>
        <div>&#x1F4CF; Distanz: <span id="distance">0</span>m</div>
    </div>

    <div id="start-screen">
        <h1>&#x26CF;&#xFE0F; Block Runner</h1>
        <p class="info">Springe auf Bl&ouml;cke und &uuml;ber Gegner!</p>
        <p class="info">Sammle Edelsteine &#x1F48E;</p>
        <p class="info">Steuerung: LEERTASTE oder Klick zum Springen</p>
        <button id="start-btn">Spielen</button>
    </div>

    <div id="game-over-screen">
        <h1>Game Over!</h1>
        <div id="final-score"></div>
        <button id="restart-btn">Nochmal</button>
    </div>

    <canvas id="game"></canvas>

    <script src="game.js"></script>
</body>
</html>
